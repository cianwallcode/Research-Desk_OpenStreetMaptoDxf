<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { min-height: 150vh; display: flex; flex-direction: column; color: orange; background: white; margin: 0; }
        nav { padding: 1rem; border-bottom: 2px solid orange; display: flex; gap: 10px; }
        footer { padding: 1rem; border-top: 2px solid orange; margin-top: auto; }
        .page { display: none; padding: 2rem; }
        .active { display: block; }
    </style>
</head>
<body>
    <nav>
        <a href="#" onclick="showPage('home')">Logo</a>
        <a href="#" onclick="showPage('home')">Home</a>
        <a href="#" onclick="showPage('inventory')">Inventory</a>
        <a href="#" onclick="showPage('comparison')">Comparison</a>
    </nav>

    <main id="content">
        <section id="home" class="page active">
            <button id="startBtn">Start project</button>
            <p>DXF used: DWG is proprietary format.</p>
        </section>
        <section id="inventory" class="page">
            <h1>Inventory</h1>
        </section>
        <section id="comparison" class="page">
            <h1>Comparison</h1>
        </section>
    </main>

    <footer>
        <p>Copyright © 2026. All rights reserved.</p>
        <p>Contact: info@site.com</p>
    </footer>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            alert("Exporting DXF file.");
        });
    </script>
</body>
</html>
