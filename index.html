<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Research Desk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #ff4500;
            --off-white: #fcfcfc;
            --gray: #e0e0e0;
            --text-dark: #333333;
        }

        body { 
            margin: 0; 
            font-family: 'Playfair Display', serif; 
            background-color: var(--off-white); 
            color: var(--text-dark); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }

        nav { 
            padding: 20px 50px; 
            font-family: 'Inter', sans-serif; 
            font-weight: 700; 
            border-bottom: 1px solid var(--gray); 
            display: flex;
            align-items: center;
        }

        .logo {
            width: 40px;
            height: 40px;
            background-color: var(--brand-orange);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            margin-right: 15px;
        }

        main { 
            flex: 1; 
            padding: 100px 50px; 
            text-align: center; 
            overflow-y: auto; 
        }

        h1 { font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        .btn { 
            background-color: var(--brand-orange); 
            color: white; 
            padding: 15px 30px; 
            border: none; 
            cursor: pointer; 
            margin-top: 20px; 
            font-family: 'Inter', sans-serif;
            font-weight: 700;
        }

        .btn:hover { opacity: 0.9; }

        footer { 
            padding: 20px; 
            text-align: center; 
            font-family: 'Inter', sans-serif; 
            font-size: 12px; 
            color: #888;
            border-top: 1px solid var(--gray);
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="window.location.href='/'">R</div>
        <span>RESEARCH DESK</span>
    </nav>
    <main>
        <h1>CONVERSION TOOL</h1>
        <form id="uploadForm">
            <input type="file" id="fileInput" accept=".osm" required>
            <br>
            <button type="button" class="btn" onclick="uploadFile()">START PROJECT</button>
        </form>
        <div id="status" style="margin-top:20px; font-family: 'Inter', sans-serif;"></div>
    </main>
    <footer>
        <p>&copy; 2026 RESEARCH DESK | CONTACT: SUPPORT@RESEARCHDESK.COM | ALL RIGHTS RESERVED</p>
    </footer>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            if (fileInput.files.length === 0) return alert("Select a file");

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            status.innerText = "Processing...";
            const response = await fetch('/', { method: 'POST', body: formData });

            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "converted_map.dxf";
                a.click();
                status.innerText = "Conversion Complete.";
            } else {
                status.innerText = "Error processing file.";
            }
        }
    </script>
</body>
</html>
